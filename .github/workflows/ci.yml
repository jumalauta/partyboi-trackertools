name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

env:
  # Docker Hub repository: <DOCKER_USERNAME>/partyboi-trackertools
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/partyboi-trackertools

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Fast tests (no Docker) — fail early before the expensive image build.
      - name: Run fast tests
        run: bash tests/run.sh

      - uses: docker/setup-buildx-action@v3

      # 2. Build the image ONCE, load it into the local daemon, cache layers in GHA.
      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: partyboi-trackertools:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Integration tests against the freshly built image.
      - name: Run Docker integration tests
        run: IMAGE=partyboi-trackertools:ci bash tests/integration_docker.sh

      # 4. Publish — only on push to main / v* tags (never on PRs), after tests pass.
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tags
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha             # reuses step-2 layers — no UADE recompile
